services:
  - name: quietzone-backend
    type: web
    runtime: docker
    plan: free
    region: oregon
    rootDir: QuietZone-backend
    dockerfilePath: ./QuietZone-backend/Dockerfile
    dockerContext: ./QuietZone-backend
    healthCheckPath: /ready
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
